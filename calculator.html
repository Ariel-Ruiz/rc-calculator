<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Calculadora Rollercoin</title>
  <style>
    :root {
      --bg: #111;
      --text: #ddd;
      --card: #1e1e1e;
      --accent: #48068a;
    }

    body.light {
      --bg: #f5f5f5;
      --text: #222;
      --card: #fff;
      --accent: #48068a;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 2rem;
      background: var(--card);
      gap: 1rem;
    }

    h1 {
      margin: 0;
      flex-grow: 1;
    }

    .container {
      padding: 2rem;
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 2rem;
      align-items: start;
    }

    textarea,
    input {
      width: 100%;
      padding: 0.8rem;
      margin-top: 1rem;
      background: var(--card);
      color: var(--text);
      border: 1px solid #444;
      border-radius: 8px;
    }

    button {
      margin-top: 1rem;
      padding: 0.6rem 1rem;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 10px;
      overflow: hidden;
      font-size: 0.9rem;
    }

    th,
    td {
      padding: 0.1rem;
      text-align: center;
      border-bottom: 1px solid #333;
    }

    th {
      background: var(--accent);
      color: white;
    }

    tr:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .editable {
      width: 80px;
      background: transparent;
      color: var(--text);
      border: 1px solid #555;
      border-radius: 5px;
      padding: 3px;
      text-align: center;
    }

    .symbol-icon {
      width: 24px;
      height: 24px;
      vertical-align: middle;
    }
  </style>
</head>

<body>
  <header>
    <h1>Calculadora Rollercoin :)</h1>
    <button id="toggleMode">🌙/☀️</button>
    <button id="toggleCurrency">USD</button>
  </header>

  <div class="container">
    <div>
      <h3>Datos de la red</h3>
      <textarea id="networkInput" placeholder="Pega aquí los datos de la red..."></textarea>
      <input type="number" id="myPower" placeholder="Tu poder (PH/s)">
      <button onclick="procesarRed()">Procesar</button>
    </div>

    <div>
      <h3>Resultados</h3>
      <table id="resultTable">
        <thead>
          <tr>
            <th>Moneda</th>
            <th>Poder red</th>
            <th>Reward/Bloque</th>
            <th>Tiempo bloque</th>
            <th>Por Bloque</th>
            <th>Por Día</th>
            <th>Por Semana</th>
            <th>Por Mes</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <script>
    let parsedLines = [];
    let useUSD = false;
    const priceCache = {};

    async function fetchAllPrices() {
      const mapSymbols = {
        btc: "bitcoin",
        eth: "ethereum",
        ltc: "litecoin",
        bnb: "binancecoin",
        doge: "dogecoin",
        xrp: "ripple",
        trx: "tron",
        sol: "solana",
        pol: "matic-network" // CoinGecko usa este ID para Polygon (MATIC)
      };

      // Armamos la lista de IDs que sí van a CoinGecko
      const ids = Object.values(mapSymbols).join(",");

      try {
        const resp = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=usd`);
        const data = await resp.json();

        // Guardamos en el cache en el mismo formato que lo pide fetchPrice
        for (const [sym, id] of Object.entries(mapSymbols)) {
          priceCache[id] = data[id]?.usd || 0;
        }

        // También guardamos los valores fijos
        priceCache["RLT"] = 1;
        priceCache["RST"] = 0.01;
      } catch (err) {
        console.error("Error al traer precios:", err);
      }
    }

    // Ahora fetchPrice solo consulta el cache
    function fetchPrice(symbol) {
      const mapSymbols = {
        btc: "bitcoin",
        eth: "ethereum",
        ltc: "litecoin",
        bnb: "binancecoin",
        doge: "dogecoin",
        xrp: "ripple",
        trx: "tron",
        sol: "solana",
        pol: "matic-network"
      };

      if (symbol === "RLT") return priceCache["RLT"] || 1;
      if (symbol === "RST") return priceCache["RST"] || 0.01;

      const id = mapSymbols[symbol.toLowerCase()];
      if (!id) return 0;

      return priceCache[id] || 0;
    }

    fetchAllPrices()

    function convertirAHs(valor, unidad) {
      unidad = unidad.toLowerCase();
      if (unidad.includes("zh")) return valor * 1e21;
      if (unidad.includes("eh")) return valor * 1e18;
      if (unidad.includes("ph")) return valor * 1e15;
      if (unidad.includes("th")) return valor * 1e12;
      if (unidad.includes("gh")) return valor * 1e9;
      if (unidad.includes("mh")) return valor * 1e6;
      return valor;
    }

    function tiempoASegundos(tiempo) {
      const partes = tiempo.split(":").map(Number);
      if (partes.length === 2) {
        return partes[0] * 60 + partes[1];
      }
      return 601;
    }

    function procesarRed() {
      let lines = document.getElementById("networkInput").value
        .split("\n").map(l => l.trim()).filter(l => l);

      lines = lines.filter(l => !['Game currencies', 'Crypto currencies'].includes(l));

      parsedLines = [];
      let i = 1;
      while (i < lines.length) {
        parsedLines.push({
          symbol: lines[i],
          power: lines[i + 3],
          reward: lines[i + 7],
          blockTime: lines[i + 9] === "00:00:00" ? "10:01" : (lines[i + 9]).substring(3, 8)
        });
        i += 11;
      }

      renderTabla();
    }

    function renderTabla() {
      const tbody = document.querySelector("#resultTable tbody");
      tbody.innerHTML = "";

      parsedLines.forEach((data, idx) => {
        const row = document.createElement("tr");
        row.setAttribute("data-idx", idx);

        row.innerHTML = `
          <td><img src="${symbolIcons[data.symbol]}" class="symbol-icon"></td>
          <td>${data.power}</td>
          <td>${data.reward}</td>
          <td><input class="editable" type="text" value="${data.blockTime}" data-idx="${idx}"></td>
          <td class="block"></td>
          <td class="day"></td>
          <td class="week"></td>
          <td class="month"></td>
        `;
        tbody.appendChild(row);

        recalcularFila(idx);
      });

      // inputs editables sin perder foco
      document.querySelectorAll(".editable").forEach(input => {
        input.addEventListener("input", e => {
          const idx = e.target.dataset.idx;
          parsedLines[idx].blockTime = e.target.value;
          recalcularFila(idx);
        });
      });
    }

    async function recalcularFila(idx) {
      const myPowerPH = parseFloat(document.getElementById("myPower").value) || 0;
      const myPowerHs = myPowerPH * 1e15;

      const data = parsedLines[idx];
      const row = document.querySelector(`tr[data-idx="${idx}"]`);
      if (!row) return;

      const [powerValue, powerUnit] = data.power.split(" ");
      const netPowerHs = convertirAHs(parseFloat(powerValue), powerUnit);

      const rewardParts = data.reward.split(" ");
      const rewardValue = parseFloat(rewardParts[0]) || 0;
      const rewardSymbol = rewardParts[1] || "";

      const blockSeconds = tiempoASegundos(data.blockTime);

      let myRewardBlock = netPowerHs > 0 ? (myPowerHs / netPowerHs) * rewardValue : 0;
      const blocksPerDay = 86400 / blockSeconds;
      let myRewardDay = myRewardBlock * blocksPerDay;
      let myRewardWeek = myRewardDay * 7;
      let myRewardMonth = myRewardDay * 30;

      let suffix = rewardSymbol;
      if (useUSD) {
        const price = await fetchPrice(rewardSymbol);
        myRewardBlock *= price;
        myRewardDay *= price;
        myRewardWeek *= price;
        myRewardMonth *= price;
        suffix = "USD";
      }

      row.querySelector(".block").textContent = myRewardBlock.toFixed(useUSD ? 2 : 8) + " " + suffix;
      row.querySelector(".day").textContent = myRewardDay.toFixed(useUSD ? 2 : 5) + " " + suffix;
      row.querySelector(".week").textContent = myRewardWeek.toFixed(useUSD ? 2 : 4) + " " + suffix;
      row.querySelector(".month").textContent = myRewardMonth.toFixed(useUSD ? 2 : 4) + " " + suffix;
    }

    document.getElementById("myPower").addEventListener("input", () => {
      parsedLines.forEach((_, idx) => recalcularFila(idx));
    });

    document.getElementById("toggleMode").addEventListener("click", () => {
      document.body.classList.toggle("light");
    });

    document.getElementById("toggleCurrency").addEventListener("click", () => {
      useUSD = !useUSD;
      document.getElementById("toggleCurrency").textContent = useUSD ? "CRYPTO" : "USD";
      parsedLines.forEach((_, idx) => recalcularFila(idx));
    });
